name: Security Audit

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9am UTC

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Add pip-audit
        run: uv add --dev pip-audit

      - name: Run pip-audit
        run: uv run pip-audit
