name: Security Audit

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9am UTC

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Add pip-audit
        run: uv add --dev pip-audit

      - name: Run pip-audit
        run: |
          # GHSA-w8v5-vhqr-4h9v: diskcache 5.6.3 — no patched version exists upstream yet
          # (transitive dep via crewai → instructor). Re-evaluate when diskcache >5.6.3 releases.
          # --skip-editable suppresses the expected "not on PyPI" notice for this local package.
          uv run pip-audit --ignore-vuln GHSA-w8v5-vhqr-4h9v --skip-editable
