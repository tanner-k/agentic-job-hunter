name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint and Test (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check
        run: uv run mypy src/worker/

      - name: Run tests
        run: uv run pytest src/worker/tests/ -x -q

  dashboard-lint:
    name: Lint and Build (Dashboard)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: src/dashboard
        run: npm ci

      - name: Lint
        working-directory: src/dashboard
        run: npm run lint

      - name: Build
        working-directory: src/dashboard
        run: npm run build
